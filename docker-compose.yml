version: '3.9'

services:
    app:
        build: .
        ports:
            - "3000:3000"
        environment:
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - NODE_ENV=production
        depends_on:
            - redis

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        command: redis-server --save "" --appendonly no
