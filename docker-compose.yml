services:
    app:
        build: .
        ports:
            - "3000:3000"
        environment:
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - NODE_ENV=production
        depends_on:
            - redis

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        command: redis-server --save "" --appendonly no

    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        volumes:
            - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        depends_on:
            - app

    grafana:
        image: grafana/grafana:latest
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
        volumes:
            - ./docker/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
            - ./docker/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
            - ./docker/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
        depends_on:
            - prometheus
