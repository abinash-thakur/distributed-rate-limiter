services:
    app:
        build: .
        ports:
            - "3000:3000"
        environment:
            - REDIS_SENTINELS=172.28.0.21:26379,172.28.0.22:26379,172.28.0.23:26379
            - REDIS_SENTINEL_NAME=mymaster
            - NODE_ENV=production
        restart: unless-stopped
        depends_on:
            - sentinel-1
            - sentinel-2
            - sentinel-3
        networks:
            ha_net:
                ipv4_address: 172.28.0.30

    redis-primary:
        image: redis:7-alpine
        hostname: redis-primary
        command: redis-server
        restart: unless-stopped
        networks:
            ha_net:
                ipv4_address: 172.28.0.10

    redis-replica-1:
        image: redis:7-alpine
        hostname: redis-replica-1
        command: redis-server --replicaof 172.28.0.10 6379
        restart: unless-stopped
        depends_on:
            - redis-primary
        networks:
            ha_net:
                ipv4_address: 172.28.0.11

    redis-replica-2:
        image: redis:7-alpine
        hostname: redis-replica-2
        command: redis-server --replicaof 172.28.0.10 6379
        restart: unless-stopped
        depends_on:
            - redis-primary
        networks:
            ha_net:
                ipv4_address: 172.28.0.12

    sentinel-1:
        image: redis:7-alpine
        command:
            - sh
            - -c
            - cp /etc/redis/sentinel-base.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf
        volumes:
            - ./docker/redis/sentinel.conf:/etc/redis/sentinel-base.conf:ro
        ports:
            - "26379:26379"
        restart: unless-stopped
        depends_on:
            - redis-primary
        networks:
            ha_net:
                ipv4_address: 172.28.0.21

    sentinel-2:
        image: redis:7-alpine
        command:
            - sh
            - -c
            - cp /etc/redis/sentinel-base.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf
        volumes:
            - ./docker/redis/sentinel.conf:/etc/redis/sentinel-base.conf:ro
        restart: unless-stopped
        depends_on:
            - redis-primary
        networks:
            ha_net:
                ipv4_address: 172.28.0.22

    sentinel-3:
        image: redis:7-alpine
        command:
            - sh
            - -c
            - cp /etc/redis/sentinel-base.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf
        volumes:
            - ./docker/redis/sentinel.conf:/etc/redis/sentinel-base.conf:ro
        restart: unless-stopped
        depends_on:
            - redis-primary
        networks:
            ha_net:
                ipv4_address: 172.28.0.23

    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        volumes:
            - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        depends_on:
            - app
        networks:
            ha_net:
                ipv4_address: 172.28.0.40

    grafana:
        image: grafana/grafana:latest
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
        volumes:
            - ./docker/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
            - ./docker/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
            - ./docker/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
        depends_on:
            - prometheus
        networks:
            ha_net:
                ipv4_address: 172.28.0.41

networks:
    ha_net:
        driver: bridge
        ipam:
            config:
                - subnet: 172.28.0.0/24
